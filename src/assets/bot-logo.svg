<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <!-- Antenna -->
  <line x1="60" y1="20" x2="60" y2="35" stroke="#2563EB" stroke-width="6" stroke-linecap="round"/>
  <circle cx="60" cy="14" r="6" stroke="#2563EB" stroke-width="5" fill="none"/>

  <!-- Left Ear -->
  <path d="M25 55 A 10 10 0 0 0 25 85" fill="none" stroke="#2563EB" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Right Ear -->
  <path d="M95 55 A 10 10 0 0 1 95 85" fill="none" stroke="#2563EB" stroke-width="6" stroke-linecap="round"/>

  <!-- Main Face (Chat bubble shape) -->
  <path d="M40 35 L80 35 C90 35 95 40 95 50 L95 105 L80 100 L40 100 C30 100 25 95 25 85 L25 50 C25 40 30 35 40 35 Z" 
        fill="none" stroke="#2563EB" stroke-width="6" stroke-linejoin="round"/>

  <!-- Left Eye (Wink) -->
