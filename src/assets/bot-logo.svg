  <!-- Right Eye (Solid circle) -->
  <circle cx="74" cy="74" r="7" fill="#333333"/>

  <!-- Mouth (Happy semi-circle) -->
  <path d="M54 85 A 8 8 0 0 0 70 85 Z" fill="#2563EB"/>
</svg>
